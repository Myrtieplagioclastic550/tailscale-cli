version: 2

builds:
  - main: .
    binary: tailscale-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/dimer47/tailscale-cli/cmd.Version={{.Version}}
      - -X github.com/dimer47/tailscale-cli/cmd.Commit={{.Commit}}
      - -X github.com/dimer47/tailscale-cli/cmd.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: dimer47
      name: homebrew-tap
    homepage: https://github.com/dimer47/tailscale-cli
    description: CLI pour l'API Tailscale v2
    license: MIT
    install: |
      bin.install "tailscale-cli"
    test: |
      system "#{bin}/tailscale-cli", "version"
